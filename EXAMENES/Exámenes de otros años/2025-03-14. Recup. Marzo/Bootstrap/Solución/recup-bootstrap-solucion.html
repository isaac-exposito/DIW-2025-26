<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2024-03-14. Recup. Bootstrap</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

  <div class="container-fluid p-3 bg-dark bg-opacity-25">

    <form>

      <div class="row justify-content-between mb-4">
        <div class="col-sm-4 col-md-3">
          <div class="form-floating">
            <input type="text" class="form-control" id="nombre" placeholder="">
            <label for="nombre">Nombre</label>
          </div>
        </div>

        <div class="col-sm-4 col-md-3">
          <div class="form-floating">
            <input type="text" class="form-control" id="apellidos" placeholder="">
            <label for="apellidos">Apellidos</label>
          </div>
        </div>

        <div class="col-sm-4 col-md-3">
          <div class="form-floating">
            <input type="text" class="form-control" id="direccion" placeholder="">
            <label for="direccion">Dirección</label>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">

        <div class="col-md-auto">
          <div class="form-floating">
            <input type="text" class="form-control" id="cp" placeholder="">
            <label for="cp">Código Postal</label>
          </div>
        </div>

        <div class="col-md-auto">
          <div class="form-floating">
            <input type="text" class="form-control" id="localidad" placeholder="">
            <label for="localidad">Localidad</label>
          </div>
        </div>

        <div class="col">
          <div class="form-floating">
            <select class="form-select" id="provincia">
              <option selected>Escoge una opción...</option>
              <option value="BA">Badajoz</option>
              <option value="CC">Cáceres</option>
            </select>
            <label for="provincia">Provincia</label>
          </div>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 d-flex justify-content-between offset-md-6">
          <button type="reset" class="btn btn-warning">Limpiar</button>
          <button type="button" class="btn btn-danger">Cancelar</button>
          <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
      </div>

    </form>
  </div>
</body>


</html>
